<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ LANGUAGES[lang]['login_title'] }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #1e222b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: #2d3436;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #414a57;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: #d63031;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3);
        }
        .login-header h1 {
            color: #d63031;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .login-header p {
            color: #b2bec3;
            font-size: 14px;
            margin-top: 5px;
        }
        .lang-toggle {
            text-align: right;
            margin-bottom: 20px;
        }
        .lang-toggle a {
            color: #b2bec3;
            text-decoration: none;
            font-size: 13px;
            padding: 4px 12px;
            background: #1e222b;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .lang-toggle a:hover {
            background: #414a57;
            color: #fff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #b2bec3;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: #1e222b;
            border: 1px solid #414a57;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #d63031;
        }
        .form-group input::placeholder {
            color: #636e72;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #d63031;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #b33939;
        }
        .error-message {
            background: #b33939;
            color: #fff;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .developer-info {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #414a57;
            color: #636e72;
            font-size: 12px;
        }
        .developer-info strong {
            color: #b2bec3;
        }
        .version {
            color: #636e72;
            font-size: 11px;
            margin-top: 10px;
            text-align: center;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 24px 20px;
                margin: 20px;
            }
            .login-header h1 {
                font-size: 24px;
            }
            .login-logo {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="lang-toggle">
            <a href="{{ url_for('toggle_lang', next=request.path) }}">
                {% if lang == 'en' %}🌐 Español{% else %}🌐 English{% endif %}
            </a>
        </div>

        <div class="login-header">
            <div class="login-logo">🔧</div>
            <h1>ANY TIME REPAIR</h1>
            <p>{{ LANGUAGES[lang]['login_subtitle'] }}</p>
        </div>

        {% if error %}
        <div class="error-message">
            ⚠ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="lang" value="{{ lang }}">
            <div class="form-group">
                <label for="username">{{ LANGUAGES[lang]['username'] }}</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">{{ LANGUAGES[lang]['password'] }}</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">{{ LANGUAGES[lang]['login'] }}</button>
        </form>

        <div class="developer-info">
            <strong>{{ LANGUAGES[lang]['developed_by'] }}</strong><br>
            {{ DEVELOPER }}
        </div>

        <div class="version">
            v2.0.0
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const usernameField = document.getElementById('username');
            if (usernameField) {
                usernameField.focus();
            }
        });
    </script>
</body>
</html>
