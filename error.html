<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - AnyTime Repair</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e222b; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .error-container { max-width: 600px; margin: 100px auto; text-align: center; }
        .error-icon { font-size: 80px; color: #d63031; }
        .error-message { background: #2d3436; padding: 20px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <h1 class="text-danger">Something went wrong</h1>
        <div class="error-message">
            <p>{{ error }}</p>
            <p class="text-muted">Please check the server logs for more details.</p>
        </div>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary mt-3">Return to Dashboard</a>
    </div>
</body>
</html>
